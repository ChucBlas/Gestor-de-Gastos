<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splashscreen</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #132a20; /* Matches --green-dark */
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .container {
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    .logo {
      width: 180px;
      height: 180px;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
      animation: pulse 2s infinite ease-in-out;
    }

    .title {
      color: #ffd700; /* Matches --yellow */
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0;
    }

    .loader {
      margin-top: 30px;
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .loader-bar {
      width: 40%;
      height: 100%;
      background: #ffd700;
      border-radius: 2px;
      position: absolute;
      left: 0;
      animation: loading 1.5s infinite ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.2)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.5)); }
    }

    @keyframes loading {
      0% { left: -40%; }
      50% { left: 100%; }
      100% { left: -40%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/benjamin_franklin.svg" alt="Logo" class="logo">
    <h1 class="title">Gestor de Gastos</h1>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
  </div>
</body>
</html>
